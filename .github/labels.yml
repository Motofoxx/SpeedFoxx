labels:
  - name: release: patch
    description: Patch-level change; small fixes and documentation updates
    color: 0e8a16
  - name: release: minor
    description: Minor feature or improvement
    color: 1d76db
  - name: release: major
    description: Major release or breaking change
    color: b60205
  - name: bug
    description: Something isn't working
    color: d73a4a
  - name: enhancement
    description: New feature or request
    color: a2eeef
  - name: documentation
    description: Documentation update
    color: 0075ca
  - name: good first issue
    description: Good entry-level issue for new contributors
    color: 7057ff
  - name: help wanted
    description: Extra attention is needed
    color: 008672
